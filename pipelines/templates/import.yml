parameters:
- name: useAlm4DataverseExtension
  type: boolean
  default: true
- name: environmentUrl
  type: string
  default: ''

stages:
  - stage: Import
    displayName: 'Import'
    jobs:
      - job: ImportJob
        displayName: 'Import'
        steps:
        - checkout: self
          fetchDepth: 1
          displayName: 'Checkout Source Code'
          path: self          

        - checkout: ALM4Dataverse
          fetchDepth: 1
          displayName: 'Checkout ALM Templates Repository'
          path: alm

        - task: PowerPlatformToolInstaller@2
          displayName: 'Install Power Platform Tools'
          inputs:
            AddToolsToPath: true

        - ${{ if eq(parameters.useAlm4DataverseExtension, true) }}:
          - task: microsoft-IsvExpTools.PowerPlatform-BuildTools.set-connection-variables.PowerPlatformSetConnectionVariables@2
            displayName: 'Set Connection Variables'
            name: PowerPlatformSetConnectionVariables
            inputs:
              authenticationType: 'PowerPlatformSPN'
              PowerPlatformSPN: Dev-${{ variables['Build.SourceBranchName'] }}

        - pwsh: |
            & "$(Pipeline.Workspace)/alm/pipelines/scripts/installdependencies.ps1"
            $environmentUrl = ''
            ${{ if eq(parameters.useAlm4DataverseExtension, true) }}:
              $environmentUrl = "$(PowerPlatformSetConnectionVariables.BuildTools.EnvironmentUrl)"
            ${{ if ne(parameters.useAlm4DataverseExtension, true) }}:
              $environmentUrl = "${{ parameters.environmentUrl }}"
            if ([string]::IsNullOrWhiteSpace($environmentUrl) -or $environmentUrl -match '^\$\(.+\)$') {
              throw "Environment URL is required. Set useAlm4DataverseExtension=true or pass environmentUrl from variables (for example: `$(EnvironmentUrl)`)."
            }
            & "$(Pipeline.Workspace)/alm/pipelines/scripts/connect.ps1" -Url $environmentUrl
            & "$(Pipeline.Workspace)/alm/pipelines/scripts/import.ps1" `
              -SourceDirectory "$(Pipeline.Workspace)/self" `
              -ArtifactStagingDirectory "$(Build.ArtifactStagingDirectory)"
          displayName: 'Connect and Import Solutions'
          workingDirectory: '$(Pipeline.Workspace)/self'    
          env:
            ${{ if eq(parameters.useAlm4DataverseExtension, true) }}:
              AZURE_CLIENT_ID: $(PowerPlatformSetConnectionVariables.BuildTools.ApplicationId)
              AZURE_TENANT_ID: $(PowerPlatformSetConnectionVariables.BuildTools.TenantId)
              AZURE_CLIENT_SECRET: $(PowerPlatformSetConnectionVariables.BuildTools.ClientSecret)
            ${{ if ne(parameters.useAlm4DataverseExtension, true) }}:
              AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
              AZURE_TENANT_ID: $(AZURE_TENANT_ID)
              AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
